# Kök uygulama build edilir (netlify-dashboard/ artık kullanılmıyor — TarpoVizyon
# Basic modülü yalnızca kök src/'de). build:netlify, git'te olmayan "tarpol rasyon
# mobil" submodülüne bağımlı rasyon-embed adımını atlar; /rasyon/ varlıkları zaten
# public/rasyon/ altında commit'li.
[build]
  publish = "dist"
  command = "npm run build:netlify"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

[[redirects]]
  from = "/api.php"
  to = "https://dersbende.com/api.php"
  status = 200
  force = true

[[redirects]]
  from = "/egg-prices"
  to = "https://basmakcitavukculuk.com/"
  status = 200
  force = true

[[redirects]]
  from = "/egg-prices-image"
  to = "https://basmakcitavukculuk.com/indexyumurta.php"
  status = 200
  force = true

[[redirects]]
  from = "/yahoo-proxy/*"
  to = "https://query1.finance.yahoo.com/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/fao/*"
  to = "https://fpma.fao.org/giews/v4/global/price_module/api/v1/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
